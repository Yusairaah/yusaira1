<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --surface:#131929;
  --border:#1e2d45;
  --accent:#4f8ef7;
  --accent2:#7c3aed;
  --text:#e8edf5;
  --muted:#6b7f99;
  --success:#22c55e;
  --card:#16213a;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.18;
  pointer-events:none;
}
.orb1{width:500px;height:500px;background:var(--accent);top:-120px;left:-100px;animation:drift 8s ease-in-out infinite alternate;}
.orb2{width:400px;height:400px;background:var(--accent2);bottom:-100px;right:-80px;animation:drift 10s ease-in-out infinite alternate-reverse;}
.orb3{width:300px;height:300px;background:#06b6d4;top:40%;left:40%;animation:drift 12s ease-in-out infinite alternate;}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}

.grid-bg{
  position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;
  opacity:0.25;
}

.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 44px;
  width:100%;
  max-width:420px;
  z-index:10;
  backdrop-filter:blur(12px);
  animation:fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
.logo-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.3px;}

h1{font-family:'DM Serif Display',serif;font-size:30px;line-height:1.15;margin-bottom:8px;letter-spacing:-0.5px;}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:36px;line-height:1.6;}

.btn-azure{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 20px;
  background:var(--accent);
  color:#fff;font-size:14px;font-weight:500;
  border:none;border-radius:12px;cursor:pointer;
  transition:transform 0.15s,background 0.15s,box-shadow 0.15s;
  text-decoration:none;
  letter-spacing:0.2px;
}
.btn-azure:hover{background:#3a7ef6;transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,142,247,0.35);}
.btn-azure:active{transform:translateY(0);}
.btn-azure svg{width:20px;height:20px;flex-shrink:0;}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.btn-guest{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px 20px;
  background:transparent;color:var(--text);font-size:14px;
  border:1px solid var(--border);border-radius:12px;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
  text-decoration:none;
}
.btn-guest:hover{background:var(--surface);border-color:var(--muted);}

.features{margin-top:32px;display:flex;flex-direction:column;gap:10px;}
.feat{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
.feat-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0;}

.footer{text-align:center;margin-top:24px;font-size:12px;color:var(--muted);}
.footer a{color:var(--accent);text-decoration:none;}

.loading-overlay{
  display:none;position:absolute;inset:0;background:rgba(11,15,26,0.7);
  border-radius:24px;z-index:20;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;backdrop-filter:blur(4px);
}
.loading-overlay.show{display:flex;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="card">
  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <span style="font-size:13px;color:var(--muted)">Signing in with Microsoft…</span>
  </div>

  <div class="logo">
    <div class="logo-icon">✓</div>
    <span class="logo-text">TaskFlow</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to manage your tasks and stay on top of every deadline.</p>

  <a href="dashboard.html" class="btn-azure" onclick="showLoader(event)">
    <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10.5 0L21 10.5L10.5 21L0 10.5L10.5 0Z" fill="#50E6FF"/>
      <path d="M10.5 0L21 10.5L10.5 7.5L0 10.5L10.5 0Z" fill="#0078D4"/>
      <path d="M10.5 13.5L21 10.5L10.5 21L0 10.5L10.5 13.5Z" fill="#0078D4"/>
    </svg>
    Continue with Microsoft Azure AD
  </a>

  <div class="divider">or</div>

 <button class="btn-guest" onclick="guestLogin()">
  Continue as guest (demo mode)
</button>







<div class="divider">or</div>

<div style="display:flex;flex-direction:column;gap:10px;">

  <input id="email" type="email" placeholder="Email"
    style="padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);" />

  <input id="password" type="password" placeholder="Password"
    style="padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);" />

  <button class="btn-azure" onclick="loginUser()">Login with Email</button>

  <button class="btn-guest" onclick="window.location.href='register.html'">
    Create new account
  </button>

</div>

<!-- your HTML content above -->

<button onclick="loginUser()"></button>

<!-- ⚠️ ADD SCRIPT HERE -->
<script>
async function loginUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  const res = await fetch("https://backendremappyusaira-cvdbf5dthtc8frbx.belgiumcentral-01.azurewebsites.net/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user_id", data.user_id);
    localStorage.setItem("email", data.email);
    localStorage.setItem("name", data.name);
    localStorage.setItem("session_type", "email");

    window.location.href = "dashboard.html";
  } else {
    alert("Invalid email or password");
  }
}

function guestLogin() {
  localStorage.setItem("session_type", "guest");
  localStorage.setItem("email", "guest@taskflow");

  window.location.href = "dashboard.html";
}

function showLoader(e){
  e.preventDefault();
  document.getElementById('loader').classList.add('show');
  setTimeout(()=>{ window.location.href='dashboard.html'; },1400);
}
</script>

</body>
</html>
</body>
</html>
