<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload - TaskFlow</title>

<style>
body {
  background: #0b1220;
  color: white;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #121a2b;
  padding: 30px;
  border-radius: 16px;
  width: 350px;
  text-align: center;
}

input {
  margin: 15px 0;
  width: 100%;
}

button {
  background: #4f8cff;
  border: none;
  padding: 12px;
  width: 100%;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

img {
  margin-top: 15px;
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Upload File</h2>

  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload</button>

  <img id="preview" />
</div>

<script>
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("https:backendremappyusaira-cvdbf5dthtc8frbx.belgiumcentral-01.azurewebsites.net/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("preview").src = data.url;
    console.log("Uploaded URL:", data.url);
  } else {
    alert("Upload failed");
  }
}
</script>

</body>
</html>
