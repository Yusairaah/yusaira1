<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Upload</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: radial-gradient(circle at top left, #0b1a2f, #050d1a);
  color: #fff;
}

/* Center container */
.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Card */
.card {
  background: rgba(20, 35, 60, 0.85);
  backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  width: 360px;
  box-shadow: 0 0 40px rgba(0, 150, 255, 0.15);
}

/* Title */
.card h2 {
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  color: #9fb3c8;
  margin-bottom: 20px;
}

/* Upload Box */
.upload-box {
  border: 2px dashed #3a6ea5;
  border-radius: 12px;
  padding: 25px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.upload-box:hover {
  background: rgba(58, 110, 165, 0.1);
}

/* File input hidden */
input[type="file"] {
  display: none;
}

/* Button */
.btn {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  color: white;
  font-weight: 500;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.9;
}

/* Uploaded file name */
.file-name {
  margin-top: 10px;
  font-size: 13px;
  color: #9fb3c8;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Upload File</h2>
    <p>Upload your task attachments securely</p>

    <label class="upload-box">
      Click or Drag File
      <input type="file" id="fileInput"/>
    </label>

    <div class="file-name" id="fileName"></div>

    <button class="btn" onclick="uploadFile()">Upload</button>
  </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");

fileInput.addEventListener("change", () => {
  fileName.innerText = fileInput.files[0]?.name || "";
});

async function uploadFile() {
  const file = fileInput.files[0];
  if (!file) return alert("Select a file");

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      alert("✅ Uploaded successfully");
    } else {
      alert("❌ Upload failed");
    }
  } catch (err) {
    console.log(err);
    alert("Error uploading file");
  }
}
</script>

</body>
</html>
