<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0f1a;
  --surface:#131929;
  --border:#1e2d45;
  --accent:#4f8ef7;
  --accent2:#7c3aed;
  --text:#e8edf5;
  --muted:#6b7f99;
  --card:#16213a;
  --success:#22c55e;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* background effects */
.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.18;
}
.orb1{width:450px;height:450px;background:var(--accent);top:-120px;left:-100px;}
.orb2{width:400px;height:400px;background:var(--accent2);bottom:-120px;right:-100px;}

.card{
  width:100%;
  max-width:420px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:40px;
  z-index:10;
  animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:25px;
}

.logo-icon{
  width:40px;height:40px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-text{
  font-family:'DM Serif Display',serif;
  font-size:22px;
}

h1{
  font-family:'DM Serif Display',serif;
  margin-bottom:6px;
}

p{
  color:var(--muted);
  font-size:14px;
  margin-bottom:25px;
}

.input{
  width:100%;
  padding:12px 14px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  outline:none;
}

.input:focus{
  border-color:var(--accent);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
  margin-top:8px;
}

.btn-primary:hover{
  background:#3a7ef6;
}

.link{
  display:block;
  text-align:center;
  margin-top:15px;
  color:var(--accent);
  text-decoration:none;
  font-size:13px;
}
</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">

  <div class="logo">
    <div class="logo-icon">✓</div>
    <div class="logo-text">TaskFlow</div>
  </div>

  <h1>Create Account</h1>
  <p>Register to start managing your tasks</p>

  <input class="input" id="name" placeholder="Full name"/>
  <input class="input" id="email" placeholder="Email"/>
  <input class="input" id="password" type="password" placeholder="Password"/>

  <button class="btn btn-primary" onclick="register()">Register</button>

  <a class="link" href="login.html">Already have an account? Login</a>

</div>

<script>
async function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!name || !email || !password) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("http://localhost:3000/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (data.success) {
      alert("Account created successfully!");
      window.location.href = "login.html";
    } else {
      alert("Registration failed");
    }

  } catch (err) {
    console.log(err);
    alert("Server error");
  }
}
</script>

</body>
</html>
